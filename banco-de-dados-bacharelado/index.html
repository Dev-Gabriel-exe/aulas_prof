<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Banco de Dados — Bacharelado · 2° Período</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
  :root{--accent:#60a5fa;--bg:#0d0f14;--surface:#161820;--border:#2a2d3a;--text:#e8eaf2;--muted:#7a7f9a;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;}
  .app{height:100vh;display:flex;flex-direction:column;position:relative;}

  /* navbar */
  .navbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:0 1.5rem;height:56px;flex-shrink:0;
    background:rgba(13,15,20,.9);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);z-index:100;
  }
  .nav-left{display:flex;align-items:center;gap:12px;}
  .back-btn{
    display:flex;align-items:center;gap:6px;
    color:var(--muted);font-size:.8rem;text-decoration:none;
    padding:5px 10px;border-radius:7px;border:1px solid var(--border);
    transition:.15s;
  }
  .back-btn:hover{background:var(--surface);color:var(--text);}
  .disc-badge{
    font-size:.75rem;font-weight:600;padding:4px 12px;border-radius:100px;
    background:rgba(96,165,250,.15);
    color:#60a5fa;border:1px solid rgba(96,165,250,.3);
  }
  .disc-title{font-family:'Montserrat',sans-serif;font-size:.95rem;font-weight:700;}

  /* semana selector */
  .semana-select{
    background:var(--surface);border:1px solid var(--border);color:var(--text);
    padding:5px 10px;border-radius:8px;font-size:.8rem;font-family:'Inter',sans-serif;
    cursor:pointer;outline:none;
  }

  /* controles */
  .nav-right{display:flex;align-items:center;gap:10px;}
  
  /* timer */
  .timer-wrap{
    display:flex;align-items:center;gap:6px;
    background:var(--surface);border:1px solid var(--border);
    padding:5px 12px;border-radius:8px;
  }
  .timer-val{font-family:'Courier New',monospace;font-size:.95rem;font-weight:700;min-width:55px;text-align:center;}
  .timer-val.warn{color:#fbbf24;}
  .timer-val.danger{color:#ef4444;animation:pulse 1s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  .timer-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:3px 6px;border-radius:5px;font-size:.85rem;transition:.15s;}
  .timer-btn:hover{background:rgba(255,255,255,.08);color:var(--text);}

  .counter{
    font-family:'Courier New',monospace;font-size:.85rem;font-weight:700;
    padding:5px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;
  }
  .nav-btn{
    display:flex;align-items:center;gap:6px;
    padding:6px 14px;border:none;border-radius:8px;cursor:pointer;
    font-family:'Inter',sans-serif;font-size:.85rem;font-weight:600;
    background:linear-gradient(135deg,#60a5fa,#60a5fa99);color:#000;
    transition:.2s;
  }
  .nav-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 12px #60a5fa44;}
  .nav-btn:disabled{opacity:.35;cursor:not-allowed;}
  .nav-btn.secondary{background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--border);}
  .nav-btn.secondary:hover{background:rgba(255,255,255,.13);}

  /* frame */
  .frame-wrap{flex:1;position:relative;overflow:hidden;}
  iframe{width:100%;height:100%;border:none;display:block;}

  /* progress */
  .progress{position:absolute;bottom:0;left:0;height:3px;background:#60a5fa;transition:width .3s ease;border-radius:0 2px 0 0;z-index:10;}

  /* arrows */
  .arrow{
    position:fixed;top:50%;transform:translateY(-50%);
    width:52px;height:52px;border-radius:50%;
    background:transparent;border:none;color:transparent;
    font-size:1.3rem;cursor:pointer;z-index:200;transition:.25s;
  }
  .arrow:hover:not(.off){background:rgba(96,165,250,.7);color:#000;transform:translateY(-50%) scale(1.1);}
  .arrow.off{opacity:.2;cursor:not-allowed;pointer-events:none;}
  .arrow-left{left:20px;}
  .arrow-right{right:20px;}
</style>
</head>
<body>
<div class="app">
  <div class="progress" id="progress"></div>

  <nav class="navbar">
    <div class="nav-left">
      <a href="../index.html" class="back-btn"><i class="fas fa-th"></i> Disciplinas</a>
      <span class="disc-badge">D1.09</span>
      <span class="disc-title">Banco de Dados — Bacharelado · 2° Período</span>
    </div>
    <div class="nav-right">
      <select id="semanaSelect" class="semana-select" onchange="goToSlide(parseInt(this.value))">
                <option value="0">Semana 01</option>
        <option value="1">Semana 02</option>
        <option value="2">Semana 03</option>
        <option value="3">Semana 04</option>
        <option value="4">Semana 05</option>
        <option value="5">Semana 06</option>
        <option value="6">Semana 07</option>
        <option value="7">Semana 08</option>
        <option value="8">Semana 09</option>
        <option value="9">Semana 10</option>
        <option value="10">Semana 11</option>
        <option value="11">Semana 12</option>
        <option value="12">Semana 13</option>
        <option value="13">Semana 14</option>
        <option value="14">Semana 15</option>
        <option value="15">Semana 16</option>
        <option value="16">Semana 17</option>
        <option value="17">Semana 18</option>
        <option value="18">Semana 19</option>
        <option value="19">Semana 20</option>
      </select>
      <div class="timer-wrap">
        <button class="timer-btn" id="timerBtn" title="Play/Pause"><i class="fas fa-play"></i></button>
        <span class="timer-val" id="timerVal">50:00</span>
        <button class="timer-btn" id="timerReset" title="Reset"><i class="fas fa-redo"></i></button>
      </div>
      <button class="nav-btn secondary" id="prevBtn"><i class="fas fa-chevron-left"></i> Anterior</button>
      <span class="counter" id="counter">1 / 20</span>
      <button class="nav-btn" id="nextBtn">Próximo <i class="fas fa-chevron-right"></i></button>
      <button class="nav-btn secondary" id="fullBtn"><i class="fas fa-expand"></i></button>
    </div>
  </nav>

  <div class="frame-wrap">
    <iframe id="frame" src="slides/slide-01.html" title="Slide 1"></iframe>
  </div>

  <button class="arrow arrow-left" id="arrowL"><i class="fas fa-chevron-left"></i></button>
  <button class="arrow arrow-right" id="arrowR"><i class="fas fa-chevron-right"></i></button>
</div>

<script>
(function(){
  const TOTAL = 20;
  let idx = 0;

  // timer
  const TIMER_INIT = 50*60;
  let timeLeft = TIMER_INIT, running = false, interval = null;
  const timerVal = document.getElementById('timerVal');
  const timerBtn = document.getElementById('timerBtn');
  document.getElementById('timerReset').onclick = () => { clearInterval(interval); running=false; timeLeft=TIMER_INIT; timerBtn.innerHTML='<i class="fas fa-play"></i>'; render(); };
  timerBtn.onclick = () => {
    if(running){ clearInterval(interval); running=false; timerBtn.innerHTML='<i class="fas fa-play"></i>'; }
    else { running=true; timerBtn.innerHTML='<i class="fas fa-pause"></i>'; interval=setInterval(()=>{ if(timeLeft>0)timeLeft--; else{clearInterval(interval);running=false;} render(); },1000); }
  };
  function render(){
    const m=Math.floor(timeLeft/60), s=timeLeft%60;
    timerVal.textContent=m+':'+(s<10?'0':'')+s;
    timerVal.className='timer-val'+(timeLeft<=60?' danger':timeLeft<=300?' warn':'');
  }
  render();

  // navigation
  const frame=document.getElementById('frame');
  const counter=document.getElementById('counter');
  const progress=document.getElementById('progress');
  const prevBtn=document.getElementById('prevBtn');
  const nextBtn=document.getElementById('nextBtn');
  const arrowL=document.getElementById('arrowL');
  const arrowR=document.getElementById('arrowR');
  const sel=document.getElementById('semanaSelect');

  function updateUI(){
    frame.src='slides/slide-'+(String(idx+1).padStart(2,'0'))+'.html';
    counter.textContent=(idx+1)+' / '+TOTAL;
    progress.style.width=((idx+1)/TOTAL*100)+'%';
    prevBtn.disabled=idx===0; nextBtn.disabled=idx===TOTAL-1;
    arrowL.className='arrow arrow-left'+(idx===0?' off':'');
    arrowR.className='arrow arrow-right'+(idx===TOTAL-1?' off':'');
    sel.value=idx;
  }

  window.goToSlide=function(i){ if(i>=0&&i<TOTAL){idx=i;updateUI();} };
  prevBtn.onclick=()=>{if(idx>0){idx--;updateUI();}};
  nextBtn.onclick=()=>{if(idx<TOTAL-1){idx++;updateUI();}};
  arrowL.onclick=()=>{if(idx>0){idx--;updateUI();}};
  arrowR.onclick=()=>{if(idx<TOTAL-1){idx++;updateUI();}};
  document.getElementById('fullBtn').onclick=()=>{document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen();};

  document.addEventListener('keydown',(e)=>{
    if(e.key==='ArrowLeft'){e.preventDefault();if(idx>0){idx--;updateUI();}}
    if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();if(idx<TOTAL-1){idx++;updateUI();}}
    if(e.key==='Home'){e.preventDefault();idx=0;updateUI();}
    if(e.key==='End'){e.preventDefault();idx=TOTAL-1;updateUI();}
  });

  updateUI();
})();
</script>
</body>
</html>
